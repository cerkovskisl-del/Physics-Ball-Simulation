<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Duel - Unbreakable Edition</title>
    <style>
        body {
            background-color: #05070f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 520px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, rgba(20, 24, 46, 0.8) 0%, rgba(10, 12, 26, 0.8) 100%);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .player-info { display: flex; flex-direction: column; }
        .blue-side { color: #00d2ff; text-align: left; }
        .red-side { color: #ff3366; text-align: right; }
        .player-name { font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; }
        .hearts { font-size: 24px; margin-top: 5px; letter-spacing: 1px; }
        .weapon-badge {
            font-size: 12px;
            background: rgba(255, 255, 255, 0.07);
            padding: 4px 12px;
            border-radius: 12px;
            margin-top: 8px;
            display: inline-block;
            letter-spacing: 1px;
            font-weight: bold;
        }
        canvas {
            background: radial-gradient(circle, #0f1326 0%, #050710 100%);
            border: 6px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(5, 7, 15, 0.95);
            border-radius: 50%;
            z-index: 10;
        }
        #winnerText {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        button {
            background: linear-gradient(90deg, #00d2ff, #0066ff);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4);
            transition: all 0.2s ease;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0, 210, 255, 0.6); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="player-info blue-side">
            <span class="player-name">Steel Blue</span>
            <div id="blueHearts" class="hearts">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
            <div><span id="blueWeapon" class="weapon-badge">BEZ IEROČA</span></div>
        </div>
        <div class="player-info red-side">
            <span class="player-name">Scarlet Red</span>
            <div id="redHearts" class="hearts">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
            <div><span id="redWeapon" class="weapon-badge">BEZ IEROČA</span></div>
        </div>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="550" height="550"></canvas>
        <div id="overlay">
            <div id="winnerText">ZILAIS UZVARĒJA!</div>
            <button onclick="resetGame()">CĪNĪTIES ATKAL</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const radius = canvas.width / 2;

let gameOver = false;
let screenShakeTimer = 0;
let screenShakeIntensity = 0;
let laserBeam = null;

const WEAPONS = {
    NONE: { id: 'NONE', name: 'BEZ IEROČA', icon: '✊', type: 'MELEE', dmg: 1 },
    KNIFE: { id: 'KNIFE', name: 'ZOBENS', icon: '⚔️', type: 'MELEE', dmg: 2 },
    PISTOL: { id: 'PISTOL', name: 'PISTOLE', icon: '🔫', type: 'RANGED', fireCount: 3, speed: 7, spread: 0.1, dmg: 1 },
    SHOTGUN: { id: 'SHOTGUN', name: 'BISE', icon: '💥', type: 'RANGED', fireCount: 8, speed: 8, spread: 0.5, dmg: 1 },
    LASER: { id: 'LASER', name: 'MEGA LĀZERS', icon: '⚡', type: 'LASER', dmg: 2 },
    STAFF: { id: 'STAFF', name: 'NŪJIŅA', icon: '🔮', type: 'MAGIC', fireCount: 1, speed: 4, dmg: 3 }
};

const ITEMS = ['KNIFE', 'PISTOL', 'SHOTGUN', 'LASER', 'STAFF', 'APPLE'];

let balls = [];
let bullets = [];
let particles = [];
let activeItem = null;

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x = x; this.y = y; this.color = color;
        this.size = size; this.vx = vx; this.vy = vy;
        this.maxLife = life; this.life = life;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vx *= 0.94; this.vy *= 0.94;
        this.life--;
    }
    draw(ctx) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function createExplosion(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 4 + 1;
        particles.push(new Particle(
            x, y, color, Math.random() * 3 + 1,
            Math.cos(angle) * speed, Math.sin(angle) * speed,
            Math.random() * 20 + 15
        ));
    }
}

class Ball {
    constructor(x, y, vx, vy, r, color, name, isLeft) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.r = r; this.color = color; this.name = name;
        this.isLeft = isLeft;
        this.maxHp = 10; this.hp = 10;
        this.weapon = WEAPONS.NONE;
        this.trail = [];
        this.hitTimer = 0;
        this.angle = 0;
    }

    update() {
        // MAKSIMĀLĀ DROŠĪBAS BARJERA PRET PAZUŠANU:
        if (isNaN(this.x) || isNaN(this.y) || isNaN(this.vx) || isNaN(this.vy) || (this.vx === 0 && this.vy === 0)) {
            this.x = this.isLeft ? 160 : 390;
            this.y = 275;
            let randAngle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(randAngle) * 3.5;
            this.vy = Math.sin(randAngle) * 3.5;
        }

        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 10) this.trail.shift();

        this.x += this.vx; 
        this.y += this.vy;
        this.angle += (this.vx * 0.02);

        if (this.hitTimer > 0) this.hitTimer--;

        let dx = this.x - radius;
        let dy = this.y - radius;
        let dist = Math.sqrt(dx * dx + dy * dy);
        dist = Math.max(0.1, dist); // Neļauj dalīt ar 0

        if (dist + this.r > radius) {
            let nx = dx / dist; 
            let ny = dy / dist;
            let dot = this.vx * nx + this.vy * ny;
            
            this.vx -= 2 * dot * nx; 
            this.vy -= 2 * dot * ny;
            
            let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
            speed = Math.min(speed * 1.04, 7.5); 
            if(speed < 2) speed = 3.5;
            
            let currentAngle = Math.atan2(this.vy, this.vx) + (Math.random() - 0.5) * 0.45;
            this.vx = Math.cos(currentAngle) * speed;
            this.vy = Math.sin(currentAngle) * speed;

            this.x = radius + nx * (radius - this.r - 3);
            this.y = radius + ny * (radius - this.r - 3);
            
            createExplosion(this.x + nx * this.r, this.y + ny * this.r, this.color, 3);
        }
    }

    draw(ctx) {
        if (isNaN(this.x) || isNaN(this.y)) return; // Drošība zīmējot

        this.trail.forEach((t, i) => {
            if(isNaN(t.x) || isNaN(t.y)) return;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.r * (i / this.trail.length), 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.save();
            ctx.globalAlpha = (i / this.trail.length) * 0.18;
            ctx.fill();
            ctx.restore();
        });

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.hitTimer > 0 ? '#ffffff' : this.color;
        ctx.fill();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillStyle = '#000000';
        let lookX = Math.max(-5, Math.min(5, this.vx * 1.2));
        let lookY = Math.max(-5, Math.min(5, this.vy * 0.4));

        ctx.beginPath();
        ctx.arc(-6 + lookX, -2 + lookY, 3, 0, Math.PI * 2);
        ctx.arc(6 + lookX, -2 + lookY, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-10 + lookX, -6 + lookY); ctx.lineTo(-2 + lookX, -2 + lookY);
        ctx.moveTo(10 + lookX, -6 + lookY); ctx.lineTo(2 + lookX, -2 + lookY);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(lookX, 6 + lookY, 4, Math.PI, 0, false);
        ctx.stroke();
        ctx.restore();

        if (this.weapon && this.weapon.id !== 'NONE') {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.font = "20px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(this.weapon.icon, this.r + 12, 0);
            ctx.restore();
        }
    }

    takeDamage(amount) {
        this.hp -= amount;
        this.hitTimer = 6;
        triggerShake(6, 10);
        createExplosion(this.x, this.y, '#ff3366', 12);
        updateUI();
        if (this.hp <= 0) handleGameOver(this);
    }
}

class Bullet {
    constructor(x, y, vx, vy, owner, dmg, type) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.owner = owner; this.dmg = dmg; this.type = type;
        this.life = 120;
    }
    update() {
        if (this.type === 'MAGIC') {
            let target = balls.find(b => b !== this.owner);
            if (target) {
                let dx = target.x - this.x; let dy = target.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                dist = Math.max(1, dist); // Droša distance nūjiņai
                this.vx += (dx / dist) * 0.35;
                this.vy += (dy / dist) * 0.35;
                
                let speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
                speed = Math.max(0.1, speed);
                if (speed > 5.5) { this.vx = (this.vx/speed)*5.5; this.vy = (this.vy/speed)*5.5; }
            }
        }
        this.x += this.vx; this.y += this.vy;
        this.life--;
    }
    draw(ctx) {
        if(isNaN(this.x) || isNaN(this.y)) return;
        ctx.beginPath();
        if (this.type === 'MAGIC') {
            ctx.arc(this.x, this.y, 6.5, 0, Math.PI * 2);
            ctx.fillStyle = '#bd00ff';
        } else {
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffea00';
        }
        ctx.fill();
    }
}

function init() {
    let startAngle1 = Math.random() * Math.PI * 2;
    let startAngle2 = Math.random() * Math.PI * 2;
    let speed = 3.5;

    balls = [
        new Ball(160, 275, Math.cos(startAngle1) * speed, Math.sin(startAngle1) * speed, 22, '#00d2ff', 'Steel Blue', true),
        new Ball(390, 275, Math.cos(startAngle2) * speed, Math.sin(startAngle2) * speed, 22, '#ff3366', 'Scarlet Red', false)
    ];
    bullets = []; particles = []; activeItem = null; gameOver = false; laserBeam = null;
    document.getElementById('overlay').style.display = 'none';
    updateUI();
}

function triggerShake(intensity, duration) {
    screenShakeIntensity = intensity;
    screenShakeTimer = duration;
}

function spawnArenaItem() {
    if (gameOver || activeItem) return;
    let type = ITEMS[Math.floor(Math.random() * ITEMS.length)];
    activeItem = {
        x: radius + (Math.random() - 0.5) * 140,
        y: radius + (Math.random() - 0.5) * 140,
        r: 18,
        type: type,
        pulse: 0
    };
}
setInterval(spawnArenaItem, 2500);

function updateUI() {
    if(!balls[0] || !balls[1]) return;
    document.getElementById('blueHearts').innerText = '❤️'.repeat(Math.max(0, balls[0].hp)) + '🖤'.repeat(Math.max(0, 10 - balls[0].hp));
    document.getElementById('redHearts').innerText = '❤️'.repeat(Math.max(0, balls[1].hp)) + '🖤'.repeat(Math.max(0, 10 - balls[1].hp));
    document.getElementById('blueWeapon').innerText = balls[0].weapon.name;
    document.getElementById('redWeapon').innerText = balls[1].weapon.name;
}

function handleGameOver(loser) {
    gameOver = true;
    let winner = balls.find(b => b !== loser);
    let txt = document.getElementById('winnerText');
    txt.innerText = `${winner.name} UZVARĒJA!`;
    txt.style.color = winner.color;
    document.getElementById('overlay').style.display = 'flex';
}

function handleBallCollisions() {
    let b1 = balls[0]; let b2 = balls[1];
    if(!b1 || !b2) return;
    let dx = b2.x - b1.x; let dy = b2.y - b1.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    dist = Math.max(0.1, dist); // Drošība pret 0

    if (dist < b1.r + b2.r) {
        let nx = dx / dist; let ny = dy / dist;
        let kx = b1.vx - b2.vx; let ky = b1.vy - b2.vy;
        let p = 2 * (nx * kx + ny * ky) / 2;

        b1.vx -= p * nx; b1.vy -= p * ny;
        b2.vx += p * nx; b2.vy += p * ny;

        let bounceChaos = (Math.random() - 0.5) * 0.5;
        b1.vx += bounceChaos; b1.vy -= bounceChaos;
        b2.vx -= bounceChaos; b2.vy += bounceChaos;

        let overlap = (b1.r + b2.r) - dist;
        b1.x -= nx * overlap * 0.5; b1.y -= ny * overlap * 0.5;
        b2.x += nx * overlap * 0.5; b2.y += ny * overlap * 0.5;

        if (b1.weapon.type === 'MELEE') {
            b2.takeDamage(b1.weapon.dmg);
            b1.weapon = WEAPONS.NONE;
        }
        if (b2.weapon.type === 'MELEE') {
            b1.takeDamage(b2.weapon.dmg);
            b2.weapon = WEAPONS.NONE;
        }
        updateUI();
    }
}

// STRĀDĀ 100% DROŠI: Aprēķinos tagad ir aizsardzība pret bumbu pārklāšanos
function shootWeapon(ball, wp) {
    let target = balls.find(b => b !== ball);
    if (!target || !wp) return;

    if (wp.type === 'LASER') {
        laserBeam = { fromX: ball.x, fromY: ball.y, toX: target.x, toY: target.y, timer: 15 };
        target.takeDamage(wp.dmg);
        return;
    }

    let dx = target.x - ball.x;
    let dy = target.y - ball.y;
    if(dx === 0 && dy === 0) { dx = 1; dy = 1; } // Novērš NaN rašanos

    let baseAngle = Math.atan2(dy, dx);
    for (let i = 0; i < wp.fireCount; i++) {
        let spread = (Math.random() - 0.5) * wp.spread;
        let finalAngle = baseAngle + spread;
        
        bullets.push(new Bullet(
            ball.x + Math.cos(finalAngle) * ball.r,
            ball.y + Math.sin(finalAngle) * ball.r,
            Math.cos(finalAngle) * wp.speed,
            Math.sin(finalAngle) * wp.speed,
            ball, wp.dmg, wp.type
        ));
    }
}

function processGame() {
    if (gameOver) return;

    let translateX = 0; let translateY = 0;
    if (screenShakeTimer > 0) {
        translateX = (Math.random() - 0.5) * screenShakeIntensity;
        translateY = (Math.random() - 0.5) * screenShakeIntensity;
        screenShakeTimer--;
        canvas.style.transform = `translate(${translateX}px, ${translateY}px)`;
    } else {
        canvas.style.transform = 'translate(0, 0)';
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
    ctx.lineWidth = 1;
    for (let i = 0; i < canvas.width; i += 25) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    if (activeItem) {
        activeItem.pulse += 0.08;
        let pulseSize = Math.sin(activeItem.pulse) * 3;

        ctx.beginPath();
        ctx.arc(activeItem.x, activeItem.y, activeItem.r + 10 + pulseSize, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(activeItem.x, activeItem.y, activeItem.r + pulseSize, 0, Math.PI * 2);
        ctx.fillStyle = activeItem.type === 'APPLE' ? 'rgba(57, 255, 20, 0.1)' : 'rgba(255, 255, 255, 0.08)';
        ctx.fill();
        ctx.strokeStyle = activeItem.type === 'APPLE' ? '#39ff14' : '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.font = "18px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        let icon = activeItem.type === 'APPLE' ? '🍎' : WEAPONS[activeItem.type].icon;
        ctx.fillText(icon, activeItem.x, activeItem.y);

        balls.forEach(ball => {
            let idx = ball.x - activeItem.x; 
            let idy = ball.y - activeItem.y;
            let idist = Math.sqrt(idx*idx + idy*idy);
            
            if (idist < ball.r + activeItem.r) {
                if (activeItem.type === 'APPLE') {
                    ball.hp = Math.min(ball.maxHp, ball.hp + 2);
                    createExplosion(ball.x, ball.y, '#39ff14', 8);
                } else {
                    let chosenWeapon = WEAPONS[activeItem.type];
                    ball.weapon = chosenWeapon;
                    shootWeapon(ball, chosenWeapon);
                    ball.weapon = WEAPONS.NONE;
                }
                activeItem = null;
                updateUI();
            }
        });
    }

    if (laserBeam && laserBeam.timer > 0) {
        ctx.save();
        ctx.beginPath();
        if(!isNaN(laserBeam.fromX) && !isNaN(laserBeam.toX)) {
            ctx.moveTo(laserBeam.fromX, laserBeam.fromY);
            ctx.lineTo(laserBeam.toX, laserBeam.toY);
            ctx.strokeStyle = '#ff0055';
            ctx.lineWidth = Math.max(1, laserBeam.timer);
            ctx.stroke();
        }
        ctx.restore();
        laserBeam.timer -= 1.5;
    }

    balls.forEach(b => b.update());
    handleBallCollisions();
    balls.forEach(b => b.draw(ctx));

    for (let i = bullets.length - 1; i >= 0; i--) {
        let bullet = bullets[i];
        if (!bullet) continue;
        bullet.update();

        balls.forEach(ball => {
            let dx = bullet.x - ball.x; let dy = bullet.y - ball.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < ball.r && bullet.owner !== ball) {
                ball.takeDamage(bullet.dmg);
                bullets.splice(i, 1);
                return;
            }
        });

        if (bullets[i]) {
            bullet.draw(ctx);
            let adx = bullet.x - radius; let ady = bullet.y - radius;
            if (Math.sqrt(adx*adx + ady*ady) > radius || bullet.life <= 0 || isNaN(bullet.x)) {
                bullets.splice(i, 1);
            }
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0 || isNaN(particles[i].x)) {
            particles.splice(i, 1);
        } else {
            particles[i].draw(ctx);
        }
    }

    requestAnimationFrame(processGame);
}

function resetGame() { init(); }

init();
processGame();
</script>

</body>
</html>
